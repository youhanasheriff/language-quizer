<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5 Reading - Language Quizer</title>
<link rel="stylesheet" href="../../style.css">
<style>
  /* Reading mode selector */
  .reading-modes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  /* Passage selector */
  .passage-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .passage-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    transition: all 0.15s;
    text-align: left;
  }
  .passage-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  .passage-btn.active { border-color: var(--accent); background: var(--bg3); }
  .passage-btn .p-title { font-weight: 600; font-family: 'Noto Sans JP', sans-serif; }
  .passage-btn .p-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* Reading card */
  .reading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
  }
  .reading-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--blue), var(--accent));
  }

  .passage-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    color: var(--text2);
    margin-bottom: 20px;
    text-align: center;
  }

  /* Flashcard mode */
  .flashcard-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 24px;
    line-height: 2;
    text-align: center;
    margin-bottom: 24px;
    padding: 20px;
  }
  .flashcard-reveal {
    background: var(--bg2);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .flashcard-reveal.show { display: block; }
  .flashcard-reveal .en { font-size: 16px; color: var(--text); margin-bottom: 8px; }
  .flashcard-reveal .romaji { font-size: 13px; color: var(--text2); }

  /* Interactive word mode */
  .interactive-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 26px;
    line-height: 2.2;
    text-align: center;
    margin-bottom: 24px;
  }
  .word-span {
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    transition: all 0.15s;
    position: relative;
  }
  .word-span:hover { background: var(--bg3); }
  .word-span.tapped { background: var(--accent); color: #fff; border-radius: 6px; }

  .word-tooltip {
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    z-index: 200;
    display: none;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .word-tooltip.show { display: block; animation: popIn 0.2s ease; }
  .word-tooltip .tt-word { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .word-tooltip .tt-reading { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .word-tooltip .tt-meaning { font-size: 14px; color: var(--accent2); }

  .sentence-translation {
    background: var(--bg2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 8px;
    margin-bottom: 16px;
    display: none;
    animation: fadeUp 0.2s ease;
  }
  .sentence-translation.show { display: block; }
  .sentence-translation .st-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; margin-bottom: 4px; }
  .sentence-translation .st-en { font-size: 14px; color: var(--text2); }

  /* Comprehension mode */
  .comp-passage {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px;
    line-height: 2;
    background: var(--bg2);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .comp-question {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px;
    margin-bottom: 6px;
  }
  .comp-question-en {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .comp-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  /* Navigation buttons */
  .nav-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
  }

  .reading-counter {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 16px;
  }

  @media (max-width: 600px) {
    .flashcard-text { font-size: 20px; }
    .interactive-text { font-size: 22px; }
    .comp-passage { font-size: 18px; }
    .comp-options { grid-template-columns: 1fr; }
    .passage-list { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <a href="../../index.html" class="logo">Language Quizer</a>
  <div class="breadcrumb">
    <a href="../../index.html">Languages</a>
    <span class="sep">/</span>
    <a href="../index.html">Japanese</a>
    <span class="sep">/</span>
    <a href="index.html">JLPT N5</a>
    <span class="sep">/</span>
    <span>Reading</span>
  </div>
</div>

<div class="container">
  <div class="reading-modes" id="reading-modes"></div>
  <div class="passage-list" id="passage-list"></div>
  <div class="reading-card" id="reading-card" style="display:none">
    <div class="reading-counter" id="reading-counter"></div>
    <div class="passage-title" id="passage-title"></div>
    <div id="reading-content"></div>
    <div class="nav-row" id="nav-row"></div>
  </div>
</div>

<div class="word-tooltip" id="word-tooltip">
  <div class="tt-word" id="tt-word"></div>
  <div class="tt-reading" id="tt-reading"></div>
  <div class="tt-meaning" id="tt-meaning"></div>
</div>

<script src="data.js"></script>
<script src="passages.js"></script>
<script src="reading.js"></script>
</body>
</html>
